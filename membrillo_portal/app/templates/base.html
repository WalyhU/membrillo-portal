<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}El Membrillo - Jaleas Artesanales{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <span class="brand-emoji">JL</span>
      <span>El Membrillo</span>
    </a>
    <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-lg-4 me-auto">
        <li class="nav-item"><a class="nav-link px-3" href="/">Catálogo</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/admin">Inventario</a></li>
      </ul>
      <div class="d-flex align-items-center">
        <a class="btn btn-outline-light d-flex align-items-center gap-2 rounded-pill px-4" href="/carrito">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-cart3" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
          </svg>
          Carrito
          <span class="badge bg-white text-dark ms-1">{{ carrito_count or 0 }}</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<footer class="text-white py-5 mt-5">
  <div class="container">
    <div class="row">
      <div class="col-md-6 mb-4 mb-md-0">
        <h4 class="navbar-brand text-white mb-3">El Membrillo</h4>
        <p class="text-white-50 small">Jaleas Artesanales S.A. - Tradición familiar Guzmán desde hace más de 40 años.</p>
      </div>
      <div class="col-md-6 text-md-end">
        <p class="small mb-0">San Francisco El Alto, Sacatepéquez</p>
        <p class="text-white-50 x-small">Guatemala, 2024</p>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/stock_sse.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
