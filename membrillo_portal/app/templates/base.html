<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}El Membrillo - Jaleas Artesanales{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-membrillo">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <span class="brand-emoji">JL</span> El Membrillo
    </a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Catalogo</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin">Admin Stock</a></li>
      </ul>
      <a class="btn btn-outline-light position-relative" href="/carrito">
        Carrito
        <span class="badge bg-warning text-dark ms-1">{{ carrito_count or 0 }}</span>
      </a>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="bg-membrillo-dark text-white py-3 mt-5">
  <div class="container small text-center">
    El Membrillo - Jaleas Artesanales S.A. - San Francisco El Alto, Sacatepequez<br>
    Tradicion familiar Guzman desde hace mas de 40 anios
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/stock_sse.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
