<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carrito · El Membrillo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body class="bg-bg-cream text-on-surface min-h-screen">

<header class="sticky top-0 z-30 glass-nav bg-primary/95 text-white">
  <div class="max-w-container mx-auto px-5 md:px-8 h-16 flex items-center gap-5">
    <a href="index.html" class="flex items-center gap-2 font-display text-xl"><span class="material-symbols-outlined text-gold ms-fill">local_florist</span> El Membrillo</a>
    <a href="carrito.html" class="relative flex items-center gap-2 bg-white/15 rounded-full px-4 py-2 text-sm ml-auto">
      <span class="material-symbols-outlined" style="font-size:20px">shopping_cart</span><span class="hidden sm:inline">Carrito</span>
      <span data-cart-count class="bg-gold text-sidebar font-bold text-xs rounded-full px-2 py-0.5">0</span>
    </a>
  </div>
</header>

<main class="max-w-container mx-auto px-5 md:px-8 py-10">
  <!-- Stepper -->
  <ol class="flex items-center justify-center gap-3 text-sm mb-8">
    <li class="flex items-center gap-2 text-primary font-semibold"><span class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs">1</span> Carrito</li>
    <li class="w-8 h-px bg-outline-variant"></li>
    <li class="flex items-center gap-2 text-primary font-semibold"><span class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs">2</span> Datos</li>
    <li class="w-8 h-px bg-outline-variant"></li>
    <li class="flex items-center gap-2 text-text-muted"><span class="w-6 h-6 rounded-full bg-card-cream flex items-center justify-center text-xs">3</span> Pago</li>
  </ol>

  <div id="errBox" class="hidden bg-[#fff0ee] border border-error-red/30 text-[#8a2c28] rounded-xl px-4 py-3 mb-6"></div>

  <div id="cartArea" class="grid lg:grid-cols-3 gap-8"></div>
  <div id="vacio" class="hidden text-center py-20">
    <span class="material-symbols-outlined text-primary/25" style="font-size:72px">remove_shopping_cart</span>
    <h2 class="font-display text-2xl mt-4">Tu carrito está esperando</h2>
    <p class="text-text-muted mt-2">Explora nuestras jaleas artesanales.</p>
    <a href="index.html" class="inline-flex items-center gap-2 mt-6 btn-primary rounded-xl px-6 py-3 font-semibold">Explorar catálogo</a>
  </div>
</main>

<div id="toast-zone"></div>
<script src="assets/membrillo.js"></script>
<script src="assets/api.js"></script>
<script>
(async function () {
  const cart = Mem.getCart();
  const area = document.getElementById("cartArea");
  if (!cart.length) { document.getElementById("vacio").classList.remove("hidden"); return; }

  let productos = [];
  try { productos = await Mem.apiFetch("/productos"); } catch (e) {}
  const byId = Object.fromEntries(productos.map((p) => [p.id, p]));
  let sucursales = [];
  try { sucursales = await Mem.apiFetch("/sucursales"); } catch (e) {}
  const user = Mem.getUser();

  function render() {
    const items = Mem.getCart().filter((i) => byId[i.producto_id]);
    if (!items.length) { area.innerHTML = ""; document.getElementById("vacio").classList.remove("hidden"); return; }
    let sub = 0;
    const lineas = items.map((i) => {
      const p = byId[i.producto_id]; const s = p.precio * i.cantidad; sub += s;
      return '<div class="flex items-center gap-4 bg-white rounded-2xl border border-outline-variant/30 soft-shadow p-4">' +
        '<div class="w-16 h-16 rounded-xl bg-card-cream flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-primary/30">local_florist</span></div>' +
        '<div class="flex-1 min-w-0"><div class="font-semibold truncate">' + p.nombre + '</div>' +
          '<div class="eyebrow text-text-muted">' + p.tipo_nombre + '</div>' +
          '<div class="flex items-center gap-2 mt-2">' +
            '<button data-dec="' + p.id + '" class="w-7 h-7 rounded-lg border border-outline-variant/50">−</button>' +
            '<span class="w-8 text-center font-semibold">' + i.cantidad + '</span>' +
            '<button data-inc="' + p.id + '" class="w-7 h-7 rounded-lg border border-outline-variant/50">+</button>' +
          '</div></div>' +
        '<div class="font-display text-lg font-bold text-primary">' + Mem.money(s) + '</div>' +
        '<button data-del="' + p.id + '" class="text-text-muted hover:text-error-red"><span class="material-symbols-outlined">delete</span></button>' +
      '</div>';
    }).join("");
    const iva = sub * 0.12, total = sub * 1.12;
    area.innerHTML =
      '<div class="lg:col-span-2 space-y-4">' + lineas + '</div>' +
      '<div class="space-y-6">' +
        '<div class="bg-card-cream/60 rounded-2xl p-6 soft-shadow">' +
          '<h2 class="font-display text-xl mb-4">Resumen</h2>' +
          '<div class="flex justify-between text-sm mb-2"><span class="text-text-muted">Subtotal</span><span>' + Mem.money(sub) + '</span></div>' +
          '<div class="flex justify-between text-sm mb-2"><span class="text-text-muted">IVA (12%)</span><span>' + Mem.money(iva) + '</span></div>' +
          '<div class="flex justify-between text-sm mb-3 pb-3 border-b border-outline-variant/40"><span class="text-text-muted">Envío</span><span class="text-success-green">Gratis en sucursal</span></div>' +
          '<div class="flex justify-between items-center"><span class="font-semibold">Total</span><span class="font-display text-2xl font-bold text-primary">' + Mem.money(total) + '</span></div>' +
        '</div>' +
        '<form id="checkoutForm" class="bg-white rounded-2xl border border-outline-variant/30 soft-shadow p-6 space-y-4">' +
          '<h3 class="font-display text-lg">Datos de facturación</h3>' +
          '<div><label class="block text-sm font-medium mb-1">Nombre completo *</label><input name="nombre" required value="' + (user ? user.nombre : '') + '" class="field"/></div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="block text-sm font-medium mb-1">NIT</label><input name="nit" value="CF" class="field"/></div>' +
            '<div><label class="block text-sm font-medium mb-1">Teléfono</label><input name="telefono" class="field"/></div>' +
          '</div>' +
          '<div><label class="block text-sm font-medium mb-1">Email</label><input type="email" name="email" value="' + (user ? user.email : '') + '" class="field"/></div>' +
          '<div><label class="block text-sm font-medium mb-1">Sucursal de retiro *</label><select name="sucursal_id" required class="field">' +
            sucursales.map((s) => '<option value="' + s.id + '">' + s.nombre + '</option>').join("") + '</select></div>' +
          '<button class="ripple w-full flex items-center justify-center gap-2 btn-primary rounded-xl py-3 font-semibold"><span class="material-symbols-outlined">lock</span> Continuar al pago</button>' +
          '<div class="flex items-center justify-center gap-4 text-xs text-text-muted pt-1"><span class="flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:16px">verified_user</span> Pago seguro</span><span class="flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:16px">receipt_long</span> Factura electrónica</span></div>' +
        '</form>' +
      '</div>';

    area.querySelectorAll("[data-inc]").forEach((b) => b.onclick = () => { Mem.setQty(+b.dataset.inc, (Mem.getCart().find((x) => x.producto_id == b.dataset.inc).cantidad) + 1); render(); });
    area.querySelectorAll("[data-dec]").forEach((b) => b.onclick = () => { const it = Mem.getCart().find((x) => x.producto_id == b.dataset.dec); Mem.setQty(+b.dataset.dec, it.cantidad - 1); render(); });
    area.querySelectorAll("[data-del]").forEach((b) => b.onclick = () => { Mem.removeFromCart(+b.dataset.del); render(); });

    document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = e.target; const btn = f.querySelector("button");
      btn.disabled = true; btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Procesando…';
      const body = {
        nombre: f.nombre.value, nit: f.nit.value || "CF", email: f.email.value || null,
        telefono: f.telefono.value || null, sucursal_id: parseInt(f.sucursal_id.value, 10),
        items: Mem.getCart(),
      };
      try {
        const r = await Mem.apiFetch("/checkout", { method: "POST", body });
        window.location.href = "pago.html?factura=" + r.factura_id;
      } catch (err) {
        const eb = document.getElementById("errBox"); eb.textContent = err.message; eb.classList.remove("hidden");
        btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined">lock</span> Continuar al pago';
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });
  }
  render();
})();
</script>
</body>
</html>
