<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crear cuenta · El Membrillo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body class="bg-bg-cream text-on-surface min-h-screen flex items-center justify-center py-10 px-4">
<div class="w-full max-w-[440px]">
  <a href="index.html" class="flex items-center justify-center gap-3 mb-8">
    <div class="w-11 h-11 rounded-xl bg-primary flex items-center justify-center"><span class="material-symbols-outlined text-gold ms-fill">local_florist</span></div>
    <p class="font-display text-2xl text-primary">El Membrillo</p>
  </a>
  <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-8">
    <span class="eyebrow text-primary">Únete</span>
    <h1 class="font-display text-3xl text-text-dark mt-1 mb-1">Crear cuenta</h1>
    <p class="text-text-muted text-sm mb-6">Compra más rápido y revisa tu historial.</p>

    <div id="errBanner" class="hidden mb-5 rounded-xl bg-[#fff0ee] border border-error-red/30 px-4 py-3 text-sm text-[#8a2c28]"></div>

    <form id="regForm" novalidate class="space-y-4">
      <div><label class="block eyebrow text-text-muted mb-1.5 ml-1">Nombre completo</label><input id="nombre" required class="field" placeholder="Juan Pérez"/></div>
      <div><label class="block eyebrow text-text-muted mb-1.5 ml-1">Correo</label><input id="email" type="email" required class="field" placeholder="tu@correo.com"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block eyebrow text-text-muted mb-1.5 ml-1">NIT</label><input id="nit" value="CF" class="field"/></div>
        <div><label class="block eyebrow text-text-muted mb-1.5 ml-1">Teléfono</label><input id="telefono" class="field" placeholder="5555-5555"/></div>
      </div>
      <div>
        <label class="block eyebrow text-text-muted mb-1.5 ml-1">Contraseña</label>
        <input id="password" type="password" required minlength="6" class="field" placeholder="Mínimo 6 caracteres"/>
        <div class="mt-2 h-1.5 rounded-full bg-card-cream overflow-hidden"><div id="pwBar" class="h-full w-0 transition-all" style="background:#E53935"></div></div>
      </div>
      <div><label class="block eyebrow text-text-muted mb-1.5 ml-1">Repetir contraseña</label><input id="password2" type="password" required class="field"/></div>
      <button type="submit" id="submitBtn" class="btn-primary ripple w-full py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2"><span class="btn-label">Crear cuenta</span></button>
    </form>
    <p class="text-center text-sm text-text-muted mt-6">¿Ya tienes cuenta? <a href="login.html" class="text-primary font-semibold underline decoration-gold/60">Ingresa</a></p>
  </div>
</div>
<script src="assets/membrillo.js"></script>
<script src="assets/api.js"></script>
<script>
  const pw = document.getElementById("password"), bar = document.getElementById("pwBar");
  pw.addEventListener("input", () => {
    const v = pw.value; let s = 0;
    if (v.length >= 6) s++; if (/[A-Z]/.test(v)) s++; if (/\d/.test(v)) s++; if (/[^\w]/.test(v)) s++;
    bar.style.width = (s * 25) + "%";
    bar.style.background = s <= 1 ? "#E53935" : s === 2 ? "#FFA726" : "#4CAF50";
  });
  const form = document.getElementById("regForm"), btn = document.getElementById("submitBtn");
  function err(m) { const b = document.getElementById("errBanner"); b.textContent = m; b.classList.remove("hidden"); }
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    document.getElementById("errBanner").classList.add("hidden");
    if (pw.value !== document.getElementById("password2").value) return err("Las contraseñas no coinciden.");
    if (pw.value.length < 6) return err("La contraseña debe tener al menos 6 caracteres.");
    btn.disabled = true; btn.querySelector(".btn-label").textContent = "Creando…";
    try {
      const r = await Mem.apiFetch("/auth/registro", { method: "POST", body: {
        nombre: document.getElementById("nombre").value, email: document.getElementById("email").value,
        password: pw.value, nit: document.getElementById("nit").value || "CF",
        telefono: document.getElementById("telefono").value || null,
      }});
      Mem.setSession(r.token, r.user);
      window.location.href = "index.html";
    } catch (e2) { btn.disabled = false; btn.querySelector(".btn-label").textContent = "Crear cuenta"; err(e2.message); }
  });
</script>
</body>
</html>
