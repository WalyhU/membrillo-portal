<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo · El Membrillo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body class="bg-bg-cream text-on-surface min-h-screen">

<!-- Nav -->
<header class="sticky top-0 z-30 glass-nav bg-primary/95 text-white">
  <div class="max-w-container mx-auto px-5 md:px-8 h-16 flex items-center gap-5">
    <a href="index.html" class="flex items-center gap-2 font-display text-xl">
      <span class="material-symbols-outlined text-gold ms-fill">local_florist</span> El Membrillo
    </a>
    <nav class="hidden md:flex items-center gap-5 text-sm">
      <a href="index.html" class="hover:text-gold">Catálogo</a>
    </nav>
    <span id="sse-status" class="hidden lg:flex items-center gap-2 ml-auto text-xs px-3 py-1 rounded-full bg-white/10">
      <span class="w-2 h-2 rounded-full bg-warning-amber"></span> conectando…
    </span>
    <div class="flex items-center gap-2 ml-auto lg:ml-3" id="navAuth"></div>
    <a href="carrito.html" class="relative flex items-center gap-2 bg-white/10 hover:bg-white/20 rounded-full px-4 py-2 text-sm">
      <span class="material-symbols-outlined" style="font-size:20px">shopping_cart</span>
      <span class="hidden sm:inline">Carrito</span>
      <span data-cart-count class="bg-gold text-sidebar font-bold text-xs rounded-full px-2 py-0.5">0</span>
    </a>
  </div>
</header>

<!-- Hero -->
<section class="cc-gradient text-white">
  <div class="max-w-container mx-auto px-5 md:px-8 py-16">
    <span class="eyebrow text-gold/90">Jaleas artesanales · 1962</span>
    <h1 class="font-display text-4xl md:text-6xl leading-tight mt-3 max-w-2xl">Sabor que cuenta historias</h1>
    <p class="text-white/75 mt-4 max-w-xl text-lg">Hechas a mano en Guatemala. Stock en vivo desde nuestras 6 sucursales.</p>
  </div>
</section>

<!-- Filtros -->
<div class="max-w-container mx-auto px-5 md:px-8 pt-8">
  <div id="filtros" class="flex flex-wrap gap-2"></div>
</div>

<!-- Grid -->
<main class="max-w-container mx-auto px-5 md:px-8 py-8">
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
  <p id="vacio" class="hidden text-center text-text-muted py-16">No hay productos.</p>
</main>

<footer class="bg-sidebar text-[#D9C6BA] mt-10">
  <div class="max-w-container mx-auto px-5 md:px-8 py-8 text-sm flex flex-wrap justify-between gap-4">
    <span class="font-display text-white text-lg">El Membrillo</span>
    <span>Hecho con cariño en Guatemala · 2026</span>
    <span id="pod-label" class="font-mono text-xs px-2 py-1 rounded bg-black/30 text-gold/90" title="Pod/instancia que atiende la API">pod: …</span>
  </div>
</footer>

<script src="assets/membrillo.js"></script>
<script src="assets/api.js"></script>
<script>
(async function () {
  // nav auth
  const u = Mem.getUser();
  document.getElementById("navAuth").innerHTML = u
    ? '<a href="mi-cuenta.html" class="text-sm hover:text-gold flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:20px">account_circle</span>' + u.nombre.split(" ")[0] + '</a><a href="#" id="logoutBtn" class="text-sm hover:text-gold">Salir</a>'
    : '<a href="login.html" class="text-sm hover:text-gold">Ingresar</a>';
  const lo = document.getElementById("logoutBtn");
  if (lo) lo.onclick = (e) => { e.preventDefault(); Mem.logout("index.html"); };

  const grid = document.getElementById("grid");
  let productos = [];
  try { productos = await Mem.apiFetch("/productos"); }
  catch (e) { grid.innerHTML = '<p class="text-error-red">No se pudo cargar el catálogo. ¿API en línea?</p>'; return; }

  if (!productos.length) { document.getElementById("vacio").classList.remove("hidden"); return; }

  // filtros por tipo
  const tipos = [...new Set(productos.map((p) => p.tipo_nombre))];
  const fil = document.getElementById("filtros");
  fil.innerHTML = ['Todos', ...tipos].map((t, i) =>
    '<button class="chip px-4 py-2 rounded-full text-sm font-medium border ' +
    (i === 0 ? 'border-primary bg-primary text-white' : 'border-primary/30 text-primary hover:bg-primary/10') +
    '" data-tipo="' + (i === 0 ? 'todos' : t) + '">' + t + '</button>').join("");

  function card(p) {
    const agotado = p.disponible_total === 0;
    const badge = agotado
      ? '<span class="absolute top-3 left-3 badge badge-void">Agotado</span>'
      : (p.disponible_total < 30 ? '<span class="absolute top-3 left-3 badge badge-pending">Pocas unidades</span>' : '');
    return '<article class="card fade-up bg-white rounded-2xl soft-shadow border border-outline-variant/30 overflow-hidden flex flex-col lift" data-tipo="' + p.tipo_nombre + '">' +
      '<a href="producto.html?id=' + p.id + '" class="block relative">' +
        '<div class="aspect-square bg-card-cream flex items-center justify-center overflow-hidden">' +
          (p.imagen_url ? '<img src="' + Mem.imgUrl(p.imagen_url) + '" class="w-full h-full object-cover" onerror="this.style.display=\'none\'"/>' : '') +
          '<span class="material-symbols-outlined text-primary/25" style="font-size:54px">local_florist</span>' +
        '</div>' + badge +
      '</a>' +
      '<div class="p-4 flex flex-col flex-1">' +
        '<span class="eyebrow text-text-muted">' + p.tipo_nombre + '</span>' +
        '<a href="producto.html?id=' + p.id + '" class="font-display text-lg mt-1 hover:text-primary">' + p.nombre + '</a>' +
        '<div class="flex items-center justify-between mt-3">' +
          '<span class="font-display text-2xl font-bold text-primary">' + Mem.money(p.precio) + '</span>' +
          '<span class="badge badge-paid" data-disponible-total="' + p.id + '">' + p.disponible_total + ' disp.</span>' +
        '</div>' +
        '<button data-add="' + p.id + '" ' + (agotado ? 'disabled' : '') + ' class="ripple mt-4 w-full flex items-center justify-center gap-2 btn-primary disabled:opacity-40 rounded-xl py-2.5 font-semibold">' +
          '<span class="material-symbols-outlined" style="font-size:20px">add_shopping_cart</span> Agregar</button>' +
      '</div></article>';
  }
  grid.innerHTML = productos.map(card).join("");

  grid.addEventListener("click", (e) => {
    const b = e.target.closest("[data-add]"); if (!b) return;
    Mem.addToCart(parseInt(b.dataset.add, 10), 1);
    window.membrilloToast({ type: "ok", icon: "shopping_basket", title: "Agregado al carrito", body: "Ver carrito para finalizar." });
  });

  fil.addEventListener("click", (e) => {
    const c = e.target.closest(".chip"); if (!c) return;
    document.querySelectorAll(".chip").forEach((x) => { x.className = "chip px-4 py-2 rounded-full text-sm font-medium border border-primary/30 text-primary hover:bg-primary/10"; });
    c.className = "chip px-4 py-2 rounded-full text-sm font-medium border border-primary bg-primary text-white";
    const t = c.dataset.tipo;
    document.querySelectorAll("#grid .card").forEach((card) => {
      card.style.display = (t === "todos" || card.dataset.tipo === t) ? "flex" : "none";
    });
  });

  // SSE: actualizar disponible
  const es = new EventSource(Mem.API + "/stream/stock");
  const st = document.getElementById("sse-status");
  es.addEventListener("ready", () => st.innerHTML = '<span class="w-2 h-2 rounded-full bg-success-green"></span> Stock en vivo');
  es.addEventListener("error", () => st.innerHTML = '<span class="w-2 h-2 rounded-full bg-error-red"></span> Reconectando…');
  es.addEventListener("stock_update", (ev) => {
    const d = JSON.parse(ev.data);
    document.querySelectorAll('[data-disponible-total="' + d.producto_id + '"]').forEach((el) => {
      el.textContent = d.disponible_total + " disp.";
      el.classList.add("stock-flash"); setTimeout(() => el.classList.remove("stock-flash"), 600);
    });
  });
})();
</script>
</body>
</html>
