apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: membrillo
  labels: { app: admin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin }
  template:
    metadata:
      labels: { app: admin }
    spec:
      containers:
        - name: admin
          image: membrillo-admin:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: membrillo
spec:
  type: NodePort
  selector: { app: admin }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081   # http://localhost:30081
