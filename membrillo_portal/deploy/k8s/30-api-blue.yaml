apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-blue
  namespace: membrillo
  labels: { app: api, color: blue }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api, color: blue }
  template:
    metadata:
      labels: { app: api, color: blue }
    spec:
      containers:
        - name: api
          image: membrillo-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: APP_COLOR
              value: "blue"
            - name: APP_VERSION
              value: "1.0"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: membrillo-secrets, key: DATABASE_URL } }
            - name: SECRET_KEY
              valueFrom: { secretKeyRef: { name: membrillo-secrets, key: SECRET_KEY } }
            - name: ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: membrillo-secrets, key: ADMIN_EMAIL } }
            - name: ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: membrillo-secrets, key: ADMIN_PASSWORD } }
            - name: ALLOWED_ORIGINS
              valueFrom: { configMapKeyRef: { name: membrillo-config, key: ALLOWED_ORIGINS } }
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { memory: "384Mi" }
