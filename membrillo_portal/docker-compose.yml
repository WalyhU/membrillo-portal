services:
  mysql:
    image: mysql:8.0
    container_name: membrillo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: membrillo
      MYSQL_DATABASE: membrillo_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmembrillo"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    container_name: membrillo_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: membrillo
      UPLOAD_LIMIT: 64M
    ports:
      - "8082:80"
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build: .
    container_name: membrillo_api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:membrillo@mysql:3306/membrillo_db
      SECRET_KEY: cambia-esto-en-produccion-membrillo-2026
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:8081,http://127.0.0.1:8080,http://127.0.0.1:8081"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./app/static/facturas:/app/app/static/facturas

  web:
    image: nginx:alpine
    container_name: membrillo_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api

  admin:
    image: nginx:alpine
    container_name: membrillo_admin
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./admin:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  mysql_data:
