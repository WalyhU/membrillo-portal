<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Productos · El Membrillo Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body data-page="productos" data-title="Productos" data-eyebrow="Administración · catálogo" class="bg-bg-cream text-on-surface min-h-screen">

<div id="admin-overlay" class="hidden fixed inset-0 bg-sidebar/50 z-40 lg:hidden"></div>
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-sidebar shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
  <div class="flex-1 min-w-0">
    <header id="admin-topbar" class="sticky top-0 z-30 bg-bg-cream/85 glass-nav border-b border-primary/10 flex items-center justify-between px-5 md:px-8 py-4"></header>
    <main class="p-5 md:p-8 space-y-6 max-w-[1200px]">
      <div class="flex items-center justify-between">
        <p class="text-sm text-text-muted">Crea, edita o desactiva productos del catálogo.</p>
        <button id="nuevoBtn" class="btn-primary ripple flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm"><span class="material-symbols-outlined" style="font-size:20px">add</span>Nuevo producto</button>
      </div>
      <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 overflow-x-auto">
        <table class="w-full text-sm min-w-[640px]">
          <thead><tr class="bg-card-cream/60 text-left">
            <th class="px-4 py-3 eyebrow text-text-muted">#</th><th class="px-4 py-3 eyebrow text-text-muted">Nombre</th>
            <th class="px-4 py-3 eyebrow text-text-muted">Tipo</th><th class="px-4 py-3 eyebrow text-text-muted text-right">Precio</th>
            <th class="px-4 py-3 eyebrow text-text-muted text-center">Estado</th><th class="px-4 py-3 eyebrow text-text-muted text-right">Acciones</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 z-[120] bg-sidebar/55 backdrop-blur-sm flex items-center justify-center p-5">
  <form id="form" class="bg-white rounded-2xl max-w-md w-full p-6 space-y-4">
    <h2 id="modalTitle" class="font-display text-xl text-text-dark">Nuevo producto</h2>
    <input type="hidden" id="pid"/>
    <div><label class="block eyebrow text-text-muted mb-1.5">Nombre</label><input id="nombre" required class="field"/></div>
    <div><label class="block eyebrow text-text-muted mb-1.5">Tipo</label><select id="tipo_id" class="field"></select></div>
    <div><label class="block eyebrow text-text-muted mb-1.5">Descripción</label><textarea id="descripcion" rows="2" class="field"></textarea></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="block eyebrow text-text-muted mb-1.5">Precio (Q)</label><input id="precio" type="number" step="0.01" min="0" required class="field"/></div>
      <div><label class="block eyebrow text-text-muted mb-1.5">Imagen URL</label><input id="imagen_url" class="field" placeholder="/static/img/…"/></div>
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button type="button" id="cancelBtn" class="px-4 py-2 rounded-xl border border-outline-variant/50">Cancelar</button>
      <button class="btn-primary px-4 py-2 rounded-xl font-semibold">Guardar</button>
    </div>
  </form>
</div>

<script src="assets/membrillo.js"></script>
<script src="assets/admin-api.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(async function () {
  if (!AdminAPI.requireAdmin()) return;
  let tipos = [];
  try { tipos = await fetch(AdminAPI.API + "/tipos").then((r) => r.json()); } catch (e) {}
  document.getElementById("tipo_id").innerHTML = tipos.map((t) => '<option value="' + t.id + '">' + t.nombre + '</option>').join("");

  const tbody = document.getElementById("tbody");
  async function load() {
    const prods = await AdminAPI.adminFetch("/admin/productos");
    tbody.innerHTML = prods.map((p) =>
      '<tr class="border-t border-outline-variant/20">' +
        '<td class="px-4 py-3 text-text-muted">' + p.id + '</td>' +
        '<td class="px-4 py-3 font-medium">' + p.nombre + '</td>' +
        '<td class="px-4 py-3">' + (p.tipo_nombre || '') + '</td>' +
        '<td class="px-4 py-3 text-right font-semibold text-primary">' + AdminAPI.money(p.precio) + '</td>' +
        '<td class="px-4 py-3 text-center"><span class="badge ' + (p.activo ? 'badge-active' : 'badge-off') + '">' + (p.activo ? 'Activo' : 'Inactivo') + '</span></td>' +
        '<td class="px-4 py-3 text-right whitespace-nowrap">' +
          '<button class="text-primary hover:text-primary-hover mr-2" data-edit=\'' + JSON.stringify(p).replace(/'/g, "&#39;") + '\'><span class="material-symbols-outlined" style="font-size:20px">edit</span></button>' +
          '<button class="text-text-muted hover:text-text-dark" data-toggle="' + p.id + '"><span class="material-symbols-outlined" style="font-size:20px">' + (p.activo ? 'toggle_on' : 'toggle_off') + '</span></button>' +
        '</td></tr>').join("");
  }
  await load();

  const modal = document.getElementById("modal"), form = document.getElementById("form");
  function openModal(p) {
    document.getElementById("modalTitle").textContent = p ? "Editar producto" : "Nuevo producto";
    document.getElementById("pid").value = p ? p.id : "";
    document.getElementById("nombre").value = p ? p.nombre : "";
    document.getElementById("tipo_id").value = p ? p.tipo_id : (tipos[0] && tipos[0].id);
    document.getElementById("descripcion").value = p ? (p.descripcion || "") : "";
    document.getElementById("precio").value = p ? p.precio : "";
    document.getElementById("imagen_url").value = p ? (p.imagen_url || "") : "";
    modal.classList.remove("hidden");
  }
  document.getElementById("nuevoBtn").onclick = () => openModal(null);
  document.getElementById("cancelBtn").onclick = () => modal.classList.add("hidden");

  tbody.addEventListener("click", async (e) => {
    const ed = e.target.closest("[data-edit]"); if (ed) { openModal(JSON.parse(ed.dataset.edit)); return; }
    const tg = e.target.closest("[data-toggle]");
    if (tg) { await AdminAPI.adminFetch("/admin/productos/" + tg.dataset.toggle + "/toggle", { method: "POST" }); load(); }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("pid").value;
    const body = {
      tipo_id: parseInt(document.getElementById("tipo_id").value, 10),
      nombre: document.getElementById("nombre").value,
      descripcion: document.getElementById("descripcion").value,
      precio: parseFloat(document.getElementById("precio").value),
      imagen_url: document.getElementById("imagen_url").value || null,
    };
    try {
      if (id) await AdminAPI.adminFetch("/admin/productos/" + id, { method: "PUT", body });
      else await AdminAPI.adminFetch("/admin/productos", { method: "POST", body });
      modal.classList.add("hidden");
      window.membrilloToast({ type: "ok", icon: "check_circle", title: "Producto guardado" });
      load();
    } catch (err) { window.membrilloToast({ type: "warn", title: "Error", body: err.message }); }
  });
})();
</script>
</body>
</html>
