<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos · El Membrillo Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body data-page="pedidos" data-title="Pedidos" data-eyebrow="Administración · facturas" class="bg-bg-cream text-on-surface min-h-screen">

<div id="admin-overlay" class="hidden fixed inset-0 bg-sidebar/50 z-40 lg:hidden"></div>
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-sidebar shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
  <div class="flex-1 min-w-0">
    <header id="admin-topbar" class="sticky top-0 z-30 bg-bg-cream/85 glass-nav border-b border-primary/10 flex items-center justify-between px-5 md:px-8 py-4"></header>
    <main class="p-5 md:p-8 space-y-6 max-w-[1200px]">
      <div class="flex flex-wrap gap-3">
        <select id="fEstado" class="field" style="width:auto"><option value="">Todos los estados</option><option value="pendiente">Pendiente</option><option value="pagada">Pagada</option><option value="anulada">Anulada</option></select>
        <select id="fSucursal" class="field" style="width:auto"><option value="">Todas las sucursales</option></select>
      </div>
      <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 overflow-x-auto">
        <table class="w-full text-sm min-w-[720px]">
          <thead><tr class="bg-card-cream/60 text-left">
            <th class="px-4 py-3 eyebrow text-text-muted">Factura</th><th class="px-4 py-3 eyebrow text-text-muted">Cliente</th>
            <th class="px-4 py-3 eyebrow text-text-muted">Sucursal</th><th class="px-4 py-3 eyebrow text-text-muted">Fecha</th>
            <th class="px-4 py-3 eyebrow text-text-muted text-center">Estado</th><th class="px-4 py-3 eyebrow text-text-muted text-right">Total</th><th class="px-4 py-3"></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="assets/membrillo.js"></script>
<script src="assets/admin-api.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(async function () {
  if (!AdminAPI.requireAdmin()) return;
  const sucs = await fetch(AdminAPI.API + "/sucursales").then((r) => r.json()).catch(() => []);
  document.getElementById("fSucursal").innerHTML += sucs.map((s) => '<option value="' + s.id + '">' + s.nombre + '</option>').join("");
  const badge = (e) => e === "pagada" ? "badge-paid" : e === "pendiente" ? "badge-pending" : "badge-void";
  const tbody = document.getElementById("tbody");

  async function load() {
    const q = new URLSearchParams();
    if (fEstado.value) q.set("estado", fEstado.value);
    if (fSucursal.value) q.set("sucursal_id", fSucursal.value);
    const fs = await AdminAPI.adminFetch("/admin/pedidos" + (q.toString() ? "?" + q : ""));
    tbody.innerHTML = fs.length ? fs.map((f) =>
      '<tr class="border-t border-outline-variant/20 hover:bg-card-cream/30">' +
        '<td class="px-4 py-3 font-medium">#' + String(f.id).padStart(6, "0") + '</td>' +
        '<td class="px-4 py-3">' + (f.cliente || '—') + '</td>' +
        '<td class="px-4 py-3">' + (f.sucursal || '—') + '</td>' +
        '<td class="px-4 py-3 text-text-muted">' + (f.fecha ? new Date(f.fecha).toLocaleString("es-GT") : '') + '</td>' +
        '<td class="px-4 py-3 text-center"><span class="badge ' + badge(f.estado) + ' capitalize">' + f.estado + '</span></td>' +
        '<td class="px-4 py-3 text-right font-semibold text-primary">' + AdminAPI.money(f.total) + '</td>' +
        '<td class="px-4 py-3 text-right"><a href="pedido-detalle.html?id=' + f.id + '" class="text-primary"><span class="material-symbols-outlined" style="font-size:20px">visibility</span></a></td>' +
      '</tr>').join("") : '<tr><td colspan="7" class="px-4 py-10 text-center text-text-muted">Sin pedidos.</td></tr>';
  }
  document.getElementById("fEstado").onchange = load;
  document.getElementById("fSucursal").onchange = load;
  await load();
})();
</script>
</body>
</html>
