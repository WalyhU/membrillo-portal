<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario · El Membrillo Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
<style>
  .cell-input { width:100%; text-align:center; font-weight:700; font-size:14px; border:1px solid transparent; border-radius:9px; padding:8px 4px; background:transparent; transition:box-shadow .15s; }
  .cell-input:focus { outline:none; box-shadow:0 0 0 2px rgba(139,0,0,.35); background:#fff; }
  .lvl-ok { background:rgba(76,175,80,.10); color:#2e7d32; }
  .lvl-mid { background:rgba(255,167,38,.12); color:#b26a00; }
  .lvl-low { background:rgba(229,57,53,.10); color:#c62828; }
  .cell-dirty { box-shadow:inset 0 0 0 2px rgba(139,0,0,.4) !important; }
</style>
</head>
<body data-page="inventario" data-title="Inventario" data-eyebrow="Administración · matriz editable" class="bg-bg-cream text-on-surface min-h-screen">

<div id="admin-overlay" class="hidden fixed inset-0 bg-sidebar/50 z-40 lg:hidden"></div>
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-sidebar shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
  <div class="flex-1 min-w-0">
    <header id="admin-topbar" class="sticky top-0 z-30 bg-bg-cream/85 glass-nav border-b border-primary/10 flex items-center justify-between px-5 md:px-8 py-4"></header>
    <main class="p-5 md:p-8 pb-28 space-y-6 max-w-[1200px]">
      <div class="flex flex-wrap items-center gap-3">
        <p class="text-sm text-text-muted">Edita una celda y se guarda al instante. El color indica el nivel de <b>disponible</b>.</p>
        <div class="ml-auto flex items-center gap-4 text-xs text-text-muted">
          <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-success-green/40"></span>OK</span>
          <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-warning-amber/40"></span>Medio</span>
          <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-error-red/40"></span>Bajo</span>
        </div>
      </div>
      <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 overflow-hidden">
        <div class="overflow-x-auto no-scrollbar">
          <table class="w-full min-w-[760px] border-collapse">
            <thead><tr class="bg-card-cream/60" id="matrixHead"></tr></thead>
            <tbody id="matrixBody"></tbody>
          </table>
        </div>
      </div>
      <p class="text-xs text-text-muted flex items-center gap-1.5"><span class="material-symbols-outlined text-warning-amber" style="font-size:16px">bolt</span>Las celdas con destello amarillo cambiaron por otra venta/usuario en tiempo real (SSE). El número entre paréntesis son unidades reservadas.</p>
    </main>
  </div>
</div>

<script src="assets/membrillo.js"></script>
<script src="assets/admin-api.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(async function () {
  if (!AdminAPI.requireAdmin()) return;
  let inv;
  try { inv = await AdminAPI.adminFetch("/admin/inventario"); } catch (e) { return; }
  const sucs = inv.sucursales;

  document.getElementById("matrixHead").innerHTML =
    '<th class="text-left eyebrow text-text-muted px-5 py-3.5 sticky left-0 bg-card-cream/60 z-10">Producto</th>' +
    sucs.map((s) => '<th class="eyebrow text-text-muted px-2 py-3.5">' + s.nombre + '</th>').join("");

  function lvl(disp) { return disp <= 5 ? "lvl-low" : disp <= 15 ? "lvl-mid" : "lvl-ok"; }
  const body = document.getElementById("matrixBody");
  body.innerHTML = inv.productos.map((p) => {
    const cells = p.celdas.map((c) =>
      '<td class="px-2 py-3"><div class="relative">' +
      '<input class="cell-input ' + lvl(c.existencia - c.reservado) + '" data-existencia-cell="' + p.id + '-' + c.sucursal_id + '" data-orig="' + c.existencia + '" type="number" min="0" value="' + c.existencia + '"/>' +
      '<span class="block text-center text-[10px] text-text-muted mt-0.5" data-restag="' + p.id + '-' + c.sucursal_id + '">' + (c.reservado > 0 ? c.reservado + ' reserv.' : '&nbsp;') + '</span>' +
      '</div></td>').join("");
    return '<tr class="border-t border-outline-variant/20"><td class="px-5 py-3 sticky left-0 bg-white z-10">' +
      '<div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg bg-card-cream flex items-center justify-center"><span class="material-symbols-outlined text-primary/40" style="font-size:20px">local_florist</span></div>' +
      '<p class="text-sm font-semibold text-text-dark whitespace-nowrap">' + p.nombre + '</p></div></td>' + cells + '</tr>';
  }).join("");

  function refreshLevel(inp, reservado) {
    const disp = (parseInt(inp.value || "0", 10)) - (reservado || 0);
    inp.classList.remove("lvl-ok", "lvl-mid", "lvl-low"); inp.classList.add(lvl(disp));
  }

  // guardar al perder foco / Enter si cambió
  body.addEventListener("change", async (e) => {
    const inp = e.target.closest(".cell-input"); if (!inp) return;
    const [pid, sid] = inp.dataset.existenciaCell.split("-").map(Number);
    const val = Math.max(0, parseInt(inp.value, 10) || 0);
    if (val === parseInt(inp.dataset.orig, 10)) return;
    inp.classList.add("cell-dirty");
    try {
      const r = await AdminAPI.adminFetch("/admin/stock", { method: "POST", body: { producto_id: pid, sucursal_id: sid, existencia: val } });
      inp.dataset.orig = r.existencia; inp.value = r.existencia;
      const tag = document.querySelector('[data-restag="' + pid + '-' + sid + '"]');
      if (tag) tag.innerHTML = r.reservado > 0 ? r.reservado + ' reserv.' : '&nbsp;';
      refreshLevel(inp, r.reservado);
      inp.classList.remove("cell-dirty");
      window.membrilloToast({ type: "ok", icon: "save", title: "Stock guardado", body: "Sincronizado en tiempo real." });
    } catch (err) {
      inp.classList.remove("cell-dirty"); window.membrilloToast({ type: "warn", title: "No se pudo guardar", body: err.message });
    }
  });
  body.addEventListener("input", (e) => { const inp = e.target.closest(".cell-input"); if (inp) refreshLevel(inp, 0); });

  // SSE: refrescar celda de otros usuarios/ventas
  document.addEventListener("membrillo:stock", (e) => {
    const d = e.detail;
    const inp = document.querySelector('[data-existencia-cell="' + d.producto_id + '-' + d.sucursal_id + '"]');
    if (inp && document.activeElement !== inp) {
      inp.value = d.existencia; inp.dataset.orig = d.existencia; refreshLevel(inp, d.reservado);
      const tag = document.querySelector('[data-restag="' + d.producto_id + '-' + d.sucursal_id + '"]');
      if (tag) tag.innerHTML = d.reservado > 0 ? d.reservado + ' reserv.' : '&nbsp;';
      const td = inp.closest("td"); td.classList.add("stock-flash"); setTimeout(() => td.classList.remove("stock-flash"), 650);
    }
  });
})();
</script>
</body>
</html>
