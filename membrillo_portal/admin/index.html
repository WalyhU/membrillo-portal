<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · El Membrillo Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/membrillo.css"/>
<script src="assets/config.js"></script>
</head>
<body data-page="dashboard" data-title="Dashboard" data-eyebrow="Administración · tiempo real" class="bg-bg-cream text-on-surface min-h-screen">

<div id="admin-overlay" class="hidden fixed inset-0 bg-sidebar/50 z-40 lg:hidden"></div>
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-sidebar shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>
  <div class="flex-1 min-w-0">
    <header id="admin-topbar" class="sticky top-0 z-30 bg-bg-cream/85 glass-nav border-b border-primary/10 flex items-center justify-between px-5 md:px-8 py-4"></header>

    <main class="p-5 md:p-8 space-y-7 max-w-[1200px]">
      <section class="grid grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-5 fade-up">
          <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center mb-3"><span class="material-symbols-outlined text-primary" style="font-size:21px">payments</span></div>
          <p class="eyebrow text-text-muted">Ventas hoy</p>
          <p class="font-display text-3xl text-text-dark mt-1">Q<span id="mVentas">0</span></p>
          <p class="text-xs text-text-muted mt-0.5"><span id="mFacturasHoy">0</span> facturas hoy</p>
        </div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-5 fade-up" style="animation-delay:.05s">
          <div class="w-10 h-10 rounded-xl bg-success-green/12 flex items-center justify-center mb-3"><span class="material-symbols-outlined text-success-green" style="font-size:21px">receipt_long</span></div>
          <p class="eyebrow text-text-muted">Facturas pagadas</p>
          <p class="font-display text-3xl text-text-dark mt-1" id="mFacturas">0</p>
          <p class="text-xs text-text-muted mt-0.5">históricas</p>
        </div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-5 fade-up" style="animation-delay:.1s">
          <div class="w-10 h-10 rounded-xl bg-gold/20 flex items-center justify-center mb-3"><span class="material-symbols-outlined text-secondary" style="font-size:21px">inventory_2</span></div>
          <p class="eyebrow text-text-muted">Stock total</p>
          <p class="font-display text-3xl text-text-dark mt-1"><span id="mStock">0</span> <span class="text-sm font-normal text-text-muted">uds</span></p>
          <p class="text-xs text-warning-amber mt-0.5 font-medium"><span id="mReservado">0</span> uds reservadas</p>
        </div>
        <div class="bg-white rounded-2xl soft-shadow border-l-4 border-error-red p-5 fade-up" style="animation-delay:.15s">
          <div class="w-10 h-10 rounded-xl bg-error-red/12 flex items-center justify-center mb-3"><span class="material-symbols-outlined text-error-red" style="font-size:21px">warning</span></div>
          <p class="eyebrow text-text-muted">Productos bajos</p>
          <p class="font-display text-3xl text-error-red mt-1" id="mBajos">0</p>
          <p class="text-xs text-text-muted mt-0.5">de <span id="mTotalProd">0</span> activos</p>
        </div>
      </section>

      <section class="grid lg:grid-cols-[1.6fr_1fr] gap-6">
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-6">
          <div class="flex items-center justify-between mb-5">
            <div><h2 class="font-display text-xl text-text-dark">Stock por sucursal</h2><p class="text-xs text-text-muted mt-0.5">Existencia · unidades</p></div>
          </div>
          <div id="barChart" class="space-y-3"></div>
        </div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-display text-xl text-text-dark">Movimiento en vivo</h2>
            <span class="flex items-center gap-1.5 text-[11px] text-success-green font-medium"><span class="dot-pulse w-2 h-2 rounded-full bg-success-green text-success-green inline-block"></span>SSE</span>
          </div>
          <ul id="liveFeed" class="space-y-3"><li class="text-sm text-text-muted">Esperando ventas…</li></ul>
        </div>
      </section>
    </main>
  </div>
</div>

<script src="assets/membrillo.js"></script>
<script src="assets/admin-api.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(async function () {
  if (!AdminAPI.requireAdmin()) return;

  let m, g;
  try { [m, g] = await Promise.all([AdminAPI.adminFetch("/admin/metricas"), AdminAPI.adminFetch("/admin/grafica")]); }
  catch (e) { return; }

  countUp(document.getElementById("mVentas"), m.ventas_hoy, { dec: 2 });
  document.getElementById("mFacturasHoy").textContent = m.facturas_hoy;
  document.getElementById("mFacturas").textContent = m.total_facturas;
  document.getElementById("mStock").textContent = m.stock_total.toLocaleString("es-GT");
  document.getElementById("mReservado").textContent = m.reservado_total;
  document.getElementById("mBajos").textContent = m.productos_bajos;
  document.getElementById("mTotalProd").textContent = m.total_productos;

  // Gráfica de barras en HTML/CSS puro (sin canvas → sin loops de resize)
  const maxv = Math.max(1, ...g.map((x) => x.total));
  document.getElementById("barChart").innerHTML = g.map((x) => {
    const pct = Math.round((x.total / maxv) * 100);
    return '<div class="flex items-center gap-3">' +
      '<span class="w-24 md:w-32 shrink-0 text-xs text-text-muted truncate">' + x.sucursal + '</span>' +
      '<div class="flex-1 h-6 rounded-lg bg-card-cream/60 overflow-hidden">' +
        '<div class="h-full rounded-lg bg-primary" style="width:' + pct + '%;transition:width .7s ease"></div></div>' +
      '<span class="w-12 text-right text-sm font-semibold text-text-dark">' + x.total + '</span>' +
    '</div>';
  }).join("");

  const maps = await AdminAPI.loadMaps();
  const feed = document.getElementById("liveFeed");
  let primera = true;
  document.addEventListener("membrillo:stock", (e) => {
    const d = e.detail;
    if (primera) { feed.innerHTML = ""; primera = false; }
    const li = document.createElement("li");
    li.className = "flex items-center gap-3 text-sm stock-flash rounded-lg p-1 -m-1";
    li.innerHTML = '<div class="w-9 h-9 rounded-lg bg-success-green/12 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-success-green" style="font-size:18px">shopping_basket</span></div>' +
      '<div class="flex-1 min-w-0"><p class="font-medium text-text-dark truncate">' + (maps.suc[d.sucursal_id] || ("Sucursal " + d.sucursal_id)) + '</p>' +
      '<p class="text-xs text-text-muted truncate">' + (maps.prod[d.producto_id] || ("Producto " + d.producto_id)) + ' · disp. ' + d.disponible + '</p></div>' +
      '<span class="font-display text-primary">' + d.existencia + '</span>';
    feed.insertBefore(li, feed.firstChild);
    while (feed.children.length > 7) feed.removeChild(feed.lastChild);
  });
})();
</script>
</body>
</html>
