name: CI - El Membrillo Portal

# Fase 3 (CI/CD): compila el proyecto y genera las imagenes Docker en cada push/PR.
on:
  push:
    branches: ["main", "develop", "feat/**", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: membrillo_portal

jobs:
  backend-check:
    name: Backend - compila e instala deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: membrillo_portal/requirements.txt
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Verificar que la app compila (import)
        run: python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('app', quiet=1) else 1)"

  docker-build:
    name: Build imagenes Docker
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: membrillo_portal
          file: membrillo_portal/Dockerfile
          push: false
          tags: membrillo-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web
        uses: docker/build-push-action@v6
        with:
          context: membrillo_portal
          file: membrillo_portal/deploy/Dockerfile.web
          push: false
          tags: membrillo-web:ci

      - name: Build Admin
        uses: docker/build-push-action@v6
        with:
          context: membrillo_portal
          file: membrillo_portal/deploy/Dockerfile.admin
          push: false
          tags: membrillo-admin:ci
