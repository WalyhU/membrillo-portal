<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos · El Membrillo Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="../assets/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/membrillo.css"/>
</head>
<body data-page="pedidos" data-title="Pedidos" data-eyebrow="Administración · facturas" class="bg-bg-cream text-on-surface min-h-screen">

<div id="admin-overlay" class="hidden fixed inset-0 bg-sidebar/50 z-40 lg:hidden"></div>
<div class="flex min-h-screen">
  <aside id="admin-sidebar" class="fixed lg:sticky top-0 left-0 z-50 h-screen w-64 bg-sidebar shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-300"></aside>

  <div class="flex-1 min-w-0">
    <header id="admin-topbar" class="sticky top-0 z-30 bg-bg-cream/85 glass-nav border-b border-primary/10 flex items-center justify-between px-5 md:px-8 py-4"></header>

    <main class="p-5 md:p-8 space-y-6 max-w-[1200px]">

      <!-- Resumen -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-4"><p class="eyebrow text-text-muted">Total</p><p class="font-display text-2xl text-text-dark mt-1">128</p></div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-4"><p class="eyebrow text-text-muted">Pagadas</p><p class="font-display text-2xl text-success-green mt-1">112</p></div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-4"><p class="eyebrow text-text-muted">Pendientes</p><p class="font-display text-2xl text-warning-amber mt-1">11</p></div>
        <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 p-4"><p class="eyebrow text-text-muted">Anuladas</p><p class="font-display text-2xl text-text-muted mt-1">5</p></div>
      </div>

      <!-- Filtros -->
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex gap-1 bg-card-cream rounded-full p-1 text-xs font-medium">
          <button class="estado-tab active px-4 py-1.5 rounded-full" data-f="all">Todas</button>
          <button class="estado-tab px-4 py-1.5 rounded-full text-text-muted" data-f="paid">Pagadas</button>
          <button class="estado-tab px-4 py-1.5 rounded-full text-text-muted" data-f="pending">Pendientes</button>
          <button class="estado-tab px-4 py-1.5 rounded-full text-text-muted" data-f="void">Anuladas</button>
        </div>
        <div class="flex items-center gap-2 bg-white rounded-xl border border-outline-variant/40 px-3 py-2">
          <span class="material-symbols-outlined text-text-muted" style="font-size:18px">location_on</span>
          <select id="sucFilter" class="bg-transparent text-sm outline-none text-text-dark pr-2">
            <option value="">Todas las sucursales</option>
            <option>Guatemala</option><option>Quetzaltenango</option><option>Mazatenango</option><option>Escuintla</option><option>Puerto Barrios</option><option>Jutiapa</option>
          </select>
        </div>
      </div>

      <!-- Tabla -->
      <div class="bg-white rounded-2xl soft-shadow border border-outline-variant/30 overflow-hidden">
        <div class="overflow-x-auto no-scrollbar">
          <table class="w-full min-w-[760px]">
            <thead>
              <tr class="bg-card-cream/60 text-left">
                <th class="eyebrow text-text-muted px-5 py-3.5">Factura</th>
                <th class="eyebrow text-text-muted px-3 py-3.5">Cliente</th>
                <th class="eyebrow text-text-muted px-3 py-3.5">Sucursal</th>
                <th class="eyebrow text-text-muted px-3 py-3.5">Fecha</th>
                <th class="eyebrow text-text-muted px-3 py-3.5">Total</th>
                <th class="eyebrow text-text-muted px-3 py-3.5">Estado</th>
                <th class="eyebrow text-text-muted px-5 py-3.5 text-right"></th>
              </tr>
            </thead>
            <tbody id="ordBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../assets/membrillo.js"></script>
<script src="../assets/admin-shell.js"></script>
<script>
  const orders = [
    { id:"MEM-2026-0847", cli:"María F. García", suc:"Guatemala", date:"28 may 2026", total:210.00, st:"pending" },
    { id:"MEM-2026-0846", cli:"Carlos Reyes", suc:"Quetzaltenango", date:"28 may 2026", total:135.00, st:"paid" },
    { id:"MEM-2026-0845", cli:"Lucía Morales", suc:"Mazatenango", date:"27 may 2026", total:88.00, st:"paid" },
    { id:"MEM-2026-0844", cli:"Diego Estrada", suc:"Guatemala", date:"27 may 2026", total:312.50, st:"paid" },
    { id:"MEM-2026-0843", cli:"Ana Beltrán", suc:"Escuintla", date:"26 may 2026", total:52.50, st:"void" },
    { id:"MEM-2026-0842", cli:"Pedro Juárez", suc:"Puerto Barrios", date:"26 may 2026", total:174.00, st:"paid" },
    { id:"MEM-2026-0841", cli:"Sofía Linares", suc:"Jutiapa", date:"25 may 2026", total:96.00, st:"pending" },
    { id:"MEM-2026-0840", cli:"Roberto Cano", suc:"Quetzaltenango", date:"25 may 2026", total:240.00, st:"paid" },
  ];
  const badge = { paid:'<span class="badge badge-paid"><span class="material-symbols-outlined" style="font-size:13px">check_circle</span>Pagada</span>',
                  pending:'<span class="badge badge-pending"><span class="material-symbols-outlined" style="font-size:13px">schedule</span>Pendiente</span>',
                  void:'<span class="badge badge-void"><span class="material-symbols-outlined" style="font-size:13px">block</span>Anulada</span>' };

  const body = document.getElementById("ordBody");
  let fEstado = "all", fSuc = "";
  function render() {
    body.innerHTML = "";
    orders.filter(o => (fEstado==="all"||o.st===fEstado) && (!fSuc||o.suc===fSuc)).forEach(o => {
      const tr = document.createElement("tr");
      tr.className = "border-t border-outline-variant/20 hover:bg-card-cream/30 transition cursor-pointer";
      tr.innerHTML =
        '<td class="px-5 py-3.5 font-mono text-sm font-medium text-text-dark whitespace-nowrap">#' + o.id + '</td>' +
        '<td class="px-3 py-3.5 text-sm text-text-dark">' + o.cli + '</td>' +
        '<td class="px-3 py-3.5 text-sm text-text-muted">' + o.suc + '</td>' +
        '<td class="px-3 py-3.5 text-sm text-text-muted whitespace-nowrap">' + o.date + '</td>' +
        '<td class="px-3 py-3.5 font-display text-lg text-primary">Q' + o.total.toFixed(2) + '</td>' +
        '<td class="px-3 py-3.5">' + badge[o.st] + '</td>' +
        '<td class="px-5 py-3.5 text-right"><a href="pedido-detalle.html" class="inline-flex items-center gap-1 text-sm font-semibold text-primary hover:text-primary-hover">Detalle<span class="material-symbols-outlined" style="font-size:16px">chevron_right</span></a></td>';
      tr.addEventListener("click", (e) => { if (!e.target.closest("a")) location.href = "pedido-detalle.html"; });
      body.appendChild(tr);
    });
    if (!body.children.length) body.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-text-muted">No hay pedidos con estos filtros.</td></tr>';
  }
  render();

  const tabs = document.querySelectorAll(".estado-tab");
  tabs.forEach(t => t.addEventListener("click", function () {
    tabs.forEach(x => { x.classList.remove("active","bg-primary","text-white"); x.classList.add("text-text-muted"); });
    this.classList.add("active","bg-primary","text-white"); this.classList.remove("text-text-muted");
    fEstado = this.dataset.f; render();
  }));
  document.querySelector(".estado-tab.active").classList.add("bg-primary","text-white");
  document.querySelector(".estado-tab.active").classList.remove("text-text-muted");
  document.getElementById("sucFilter").addEventListener("change", e => { fSuc = e.target.value; render(); });
</script>
</body>
</html>
